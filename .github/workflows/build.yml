name: Build Android APK

on:
  push:
    branches: [ master, main ]
    tags: [ v* ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        env:
          # 签名配置（可选，需要在 GitHub Secrets 中配置）
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 如果配置了签名，则构建带签名的 Release APK
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "$KEYSTORE_FILE" | base64 -d > keystore.jks
            echo "storeFile=keystore.jks" > local.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> local.properties
            echo "keyAlias=$KEY_ALIAS" >> local.properties
            echo "keyPassword=$KEY_PASSWORD" >> local.properties
            ./gradlew assembleRelease
          else
            ./gradlew assembleRelease
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
